baseURL = "https://gridthegrey.com/"
languageCode = "en-us"
title = "GRID THE GREY"
[pagination]
  pagerSize = 15
enableRobotsTXT = true
enableEmoji = false
copyright = "© 2026 Grid the Grey. All rights reserved."

[params]
  description = "AI Security Intelligence — Real-time threat analysis, MITRE ATLAS mapping, and OWASP LLM Top 10 coverage."
  tagline = "AI Security News. Framework Analysis."
  tagline2 = "Structural Insight."
  taglineSub = "Every article scored, classified, and mapped to MITRE ATLAS and OWASP LLM Top 10 — so you always know what matters and why."
  accentColor = "#ff3b3b"
  darkBg = "#0a0a0f"
  author = "Grid the Grey Editorial"
  twitterHandle = "@gridthegrey"
  githubURL = "https://github.com/bansac1981/sentinel-ai"
  newsletterURL = "https://gridthegrey.beehiiv.com/subscribe"
  enableTicker = true
  enableThreatRadar = true
  enableFrameworkBadges = true
  scoreThreshold = 6.0
  enablePodcastPlayer = true
  latestEpisodeUrl = "https://pub-935e4acdc21d48bc8e73087b20f1dc3f.r2.dev/grid-the-grey-briefing-2026-W16-onyx.mp3"
  latestEpisodeTitle = "Week 16, 2026 — AI Security Briefing"
  podcastFeedUrl = "https://pub-935e4acdc21d48bc8e73087b20f1dc3f.r2.dev/feed.xml"

[taxonomies]
  category = "categories"
  tag = "tags"
  framework = "frameworks"
  threat_actor = "threat_actors"

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
  page = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false

[menu]
  [[menu.main]]
    name = "MITRE ATLAS"
    url = "/frameworks/mitre-atlas/"
    weight = 2
  [[menu.main]]
    name = "OWASP LLM"
    url = "/framework