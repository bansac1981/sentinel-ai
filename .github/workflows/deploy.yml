name: "Grid the Grey — Build & Deploy to GitHub Pages"

# ─────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      # Rebuild when content or theme changes
      - "hugo-site/**"
      - ".github/workflows/deploy.yml"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

# ─────────────────────────────────────────────
# Permissions
# ─────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress deploys
concurrency:
  group: "github-pages"
  cancel-in-progress: false

# ─────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────
jobs:

  # ── Job 1: Auto-Publish any drafts marked draft:false ──────────────
  auto-publish:
    name: "Auto-Publish Drafted Posts"
    runs-on: ubuntu-latest
    permissions:
      contents: write   # This job needs to commit + push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Publish drafts marked draft:false
        run: |
          git config user.name "Grid the Grey Bot"
          git config user.email "bot@gridthegrey.com"

          PUBLISHED_COUNT=0

          for f in hugo-site/content/posts/drafts/*.md; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            [ "$BASENAME" = "_index.md" ] && continue

            if grep -q "^draft: false" "$f"; then
              SLUG=$(echo "$BASENAME" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//;s/\.md$//')
              DATE_PREFIX=$(echo "$BASENAME" | grep -oP '^\d{4}-\d{2}-\d{2}')
              PUBLISH_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
              DEST_FILE="hugo-site/content/posts/${DATE_PREFIX}-${SLUG}.md"
              TITLE=$(grep "^title:" "$f" | head -1 | sed 's/^title: *//;s/^"//;s/"$//')

              echo "Publishing: $TITLE"
              git mv "$f" "$DEST_FILE"
              sed -i "s|^date:.*$|date: \"${PUBLISH_DATE}\"|" "$DEST_FILE"
              git add "$DEST_FILE"

              PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
            fi
          done

          if [ "$PUBLISHED_COUNT" -gt 0 ]; then
            git commit -m "auto-publish: $PUBLISHED_COUNT article(s)"
            git push
            echo "Pushed $PUBLISHED_COUNT published article(s)."
          else
            echo "No drafts to publish."
          fi

  # ── Job 2: Build Hugo site ──────────────────
  build:
    name: "Build Hugo site"
    needs: auto-publish    # Always runs after auto-publish (even if nothing was published)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main        # Get latest main — includes any auto-published articles
          fetch-depth: 0

      - name: Setup Hugo (extended)
        run: |
          HUGO_VERSION="0.140.2"
          curl -Lo /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: hugo-site
        env:
          HUGO_ENVIRONMENT: production
          TZ: Asia/Kolkata
        run: |
          hugo \
            --minify \
            --baseURL "https://gridthegrey.com/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-site/public

  # ── Job 3: Deploy to GitHub Pages ───────────
  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      # ─────────────────────────────────────────────────────────────
      # NEW: Google Indexing API (Workload Identity Federation)
      # ─────────────────────────────────────────────────────────────
      
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          # Using your verified Project 742662365824 and gtg-pool
          workload_identity_provider: 'projects/742662365824/locations/global/workloadIdentityPools/gtg-pool/providers/github-provider'
          service_account: 'google-seo-indexer@fiery-tribute-493613-r1.iam.gserviceaccount.com'

      - name: 'Google Indexing API 🚀'
        uses: 'm3m3nto/giaa@v1.1'
        with:
          sitemap_url: "https://gridthegrey.com/sitemap.xml"
    # ───────────────────────────────────────────────────────────── 
