name: "SENTINEL AI — Build & Deploy to GitHub Pages"

# ─────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when content or theme actually changed
      - "hugo-site/**"
      - ".github/workflows/deploy.yml"

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

# ─────────────────────────────────────────────
# Permissions required for GitHub Pages deployment
# ─────────────────────────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy can run at a time; don't cancel in-progress deploys
concurrency:
  group: "github-pages"
  cancel-in-progress: false

# ─────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────
jobs:

  # ── Job 1: Build Hugo site ──────────────────
  build:
    name: "Build Hugo site"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for .GitInfo and lastmod

      - name: Setup Hugo (extended)
        run: |
          HUGO_VERSION="0.140.2"
          curl -Lo /tmp/hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        working-directory: hugo-site
        env:
          HUGO_ENVIRONMENT: production
          TZ: Asia/Kolkata
        run: |
          hugo \
            --minify \
            --baseURL "https://gridthegrey.com/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-site/public

  # ── Job 2: Deploy to GitHub Pages ───────────
  deploy:
    name: "Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
